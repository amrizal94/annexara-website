<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — Annexara</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth.css">
</head>
<body>
<nav class="auth-nav"><a href="/"><img src="/assets/logo.png?v=2" alt="Annexara"></a></nav>
<div class="auth-wrap">
  <div class="card">
    <h1>Lupa Password?</h1>
    <p class="sub">Masukkan email terdaftar. Kami kirim link untuk membuat password baru.</p>
    <div id="msg" class="msg hidden"></div>
    <form id="form">
      <div class="field"><label>Email</label><input id="email" type="email" required autocomplete="email"></div>
      <button class="btn" type="submit" id="submit">Kirim Link Reset</button>
    </form>
    <p class="foot"><a class="link" href="/login.html">← Kembali ke login</a></p>
  </div>
</div>

<script type="module">
import { auth } from "/firebase-init.js";
import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const $ = id => document.getElementById(id);
const msg = $("msg");

$("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  $("submit").disabled = true;
  try {
    await sendPasswordResetEmail(auth, $("email").value.trim());
  } catch (_) { /* don't reveal whether the email exists */ }
  // Always show success — avoids leaking which emails are registered.
  msg.textContent = "Jika email terdaftar, link reset sudah dikirim. Cek inbox & folder Spam.";
  msg.className = "msg ok";
  $("submit").disabled = false;
});
</script>
</body>
</html>
